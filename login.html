<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savor | Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <script>
        // If already logged in, instantly redirect away from the login page
        if (sessionStorage.getItem('isLoggedIn')) {
            window.location.replace('index.html');
        }
    </script>
</head>
<body>
    <!-- The Cloche Reveal Animation Element -->
    <div class="cloche-reveal" id="clocheReveal">
        <div class="cloche-content">
            <svg class="cloche-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Simple cloche dome shape -->
                <path d="M10,80 Q50,0 90,80" fill="transparent" stroke="#ff5e3a" stroke-width="3"/>
                <path d="M50,20 A5,5 0 1,0 50,10 A5,5 0 1,0 50,20 Z" fill="#ff5e3a"/>
                <line x1="5" y1="80" x2="95" y2="80" stroke="#ff5e3a" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <h2>Uncovering Savor...</h2>
        </div>
    </div>

    <!-- Floating Background Elements -->
    <div class="background-container">
        <!-- Floating Pizzas -->
        <div class="floating-item item-1">🍕</div>
        <div class="floating-item item-2">🍕</div>
        <div class="floating-item item-3">🍕</div>
        <div class="floating-item item-4">🍔</div>
        <div class="floating-item item-5">🥗</div>
        <div class="floating-item item-6">🍕</div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo">
                    <i class="fa-solid fa-leaf"></i>
                    <span>Savor.</span>
                </div>
                <p>Delivering elegance, one bite at a time.</p>
            </div>

            <form id="loginForm" class="login-form">
                <div id="authErrorMessage" class="error-message" style="display: none;">Invalid credentials</div>

                <div class="input-group" id="nameGroup" style="display: none;">
                    <label for="fullname">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="fullname" placeholder="John Doe">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="foodie@example.com" required>
                    </div>
                </div>

                <div class="input-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-options" id="formOptions">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-pass" id="forgotPassBtn">Forgot Password?</a>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="submitText">Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-divider" id="authDivider">
                <span>or continue with</span>
            </div>

            <div class="social-login" id="socialLoginArea">
                <button class="social-btn"><i class="fa-brands fa-google"></i></button>
                <button class="social-btn"><i class="fa-brands fa-apple"></i></button>
            </div>
            
            <p class="signup-link" id="authPrompt">New to Savor? <a href="#" id="toggleAuthBtn">Create an account</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
